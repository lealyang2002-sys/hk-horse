<style>
  /* Pulse ring animation when recording */
  @keyframes pulse-ring {
    0%   { transform: scale(1);   opacity: .6; }
    100% { transform: scale(1.7); opacity: 0;  }
  }
  .pulse-ring::before,
  .pulse-ring::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: #fcd535;
    animation: pulse-ring 1.2s ease-out infinite;
  }
  .pulse-ring::after { animation-delay: .4s; }

  /* Wave bars animation */
  @keyframes wave {
    0%, 100% { transform: scaleY(.3); }
    50%       { transform: scaleY(1);  }
  }
  .wave-bar { animation: wave 1s ease-in-out infinite; }
  .wave-bar:nth-child(2) { animation-delay: .1s; }
  .wave-bar:nth-child(3) { animation-delay: .2s; }
  .wave-bar:nth-child(4) { animation-delay: .3s; }
  .wave-bar:nth-child(5) { animation-delay: .2s; }
  .wave-bar:nth-child(6) { animation-delay: .1s; }
  .wave-bar:nth-child(7) { animation-delay: .0s; }

  /* Thinking dots */
  @keyframes dot-blink {
    0%, 80%, 100% { opacity: 0; }
    40%           { opacity: 1; }
  }
  .dot { animation: dot-blink 1.4s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }

<script>
// ── Auth guard ──────────────────────────────────────────────────────────────
(function() {
  const u = JSON.parse(sessionStorage.getItem('cmhk_auth_user') || 'null');
  if (!u) { location.href = 'login.html'; return; }
  document.querySelectorAll('[data-user-name]').forEach(el => el.textContent = u.name || u.username);
  document.querySelectorAll('[data-user-role]').forEach(el => el.textContent = u.role || 'VIP 會員');
})();
function logout() { sessionStorage.removeItem('cmhk_user'); location.href = 'login.html'; }

// ── State ───────────────────────────────────────────────────────────────────
let audioCtx = null;
let mediaStream = null;
let scriptProcessor = null;
let silentGain = null;
let pcmChunks = [];
let isRecording = false;
let isBusy = false;   // processing / playing
let currentAudio = null;

const pttBtn   = document.getElementById('ptt-btn');
const btnIcon  = document.getElementById('btn-icon');
const statusLabel = document.getElementById('status-label');
const waveVis  = document.getElementById('wave-vis');
const history  = document.getElementById('history');
const emptyState = document.getElementById('empty-state');

// ── UI helpers ──────────────────────────────────────────────────────────────
function setStatus(state, msg) {
  waveVis.classList.add('hidden');
  waveVis.classList.remove('flex');

  if (state === 'idle') {
    statusLabel.textContent = '按住說話';
    btnIcon.textContent = 'mic';
    pttBtn.style.background = '';
    pttBtn.classList.remove('pulse-ring');
  } else if (state === 'recording') {
    statusLabel.textContent = '錄音中 — 鬆開發送';
    btnIcon.textContent = 'stop';
    pttBtn.style.background = '#f6465d';
    pttBtn.classList.add('pulse-ring');
    waveVis.classList.remove('hidden');
    waveVis.classList.add('flex');
  } else if (state === 'thinking') {
    statusLabel.innerHTML = 'AI 思考中 <span class="dot">·</span><span class="dot">·</span><span class="dot">·</span>';
    btnIcon.textContent = 'hourglass_empty';
    pttBtn.style.background = '#2b3139';
    pttBtn.classList.remove('pulse-ring');
  } else if (state === 'playing') {
    statusLabel.textContent = 'AI 回覆播放中';
    btnIcon.textContent = 'volume_up';
    pttBtn.style.background = '#0ecb81';
    pttBtn.classList.remove('pulse-ring');
  } else if (state === 'error') {
    statusLabel.textContent = msg || '發生錯誤，請重試';
    btnIcon.textContent = 'mic';
    pttBtn.style.background = '';
    pttBtn.classList.remove('pulse-ring');
  }
}

function addBubble(role, content) {
  emptyState.remove();

  const isUser = role === 'user';
  const wrap = document.createElement('div');
  wrap.className = `flex ${isUser ? 'justify-end' : 'justify-start'} items-end gap-sm`;

  if (!isUser) {
    wrap.innerHTML = `
      <div class="w-8 h-8 rounded-full bg-primary-container/20 border border-primary-container/30 flex items-center justify-center shrink-0">
        <span class="material-symbols-outlined text-primary-container text-[14px]" style="font-variation-settings:'FILL' 1;">smart_toy</span>
      </div>`;
  }

  const bubble = document.createElement('div');
  bubble.className = isUser
    ? 'max-w-xs bg-primary-container/20 border border-primary-container/30 text-on-surface rounded-xl rounded-br-sm px-md py-sm'
    : 'max-w-xs bg-surface-card-dark border border-hairline-dark text-on-surface rounded-xl rounded-bl-sm px-md py-sm';

  bubble.innerHTML = content;
  wrap.appendChild(bubble);

  if (isUser) {
    wrap.innerHTML += `
      <div class="w-8 h-8 rounded-full bg-primary-container/20 border border-primary-container/30 flex items-center justify-center shrink-0">
        <span class="material-symbols-outlined text-primary-container text-[14px]" style="font-variation-settings:'FILL' 1;">person</span>
      </div>`;
  }

  history.appendChild(wrap);
  history.scrollTop = history.scrollHeight;
  return bubble;
}

function clearHistory() {
  history.innerHTML = `
    <div class="flex flex-col items-center justify-center flex-1 gap-md text-center" id="empty-state">
      <div class="w-16 h-16 rounded-full bg-surface-card-dark border border-hairline-dark flex items-center justify-center">
        <span class="material-symbols-outlined text-primary-container text-[32px]" style="font-variation-settings:'FILL' 1;">record_voice_over</span>
      </div>
      <div>
        <p class="text-on-surface font-semibold text-[16px]">賽馬AI語音助手</p>
        <p class="text-muted text-[13px] mt-xxs">按住下方按鈕說話，鬆開後 AI 即時回覆</p>
      </div>
    </div>`;
  setStatus('idle');
}

function now() {
  return new Date().toLocaleTimeString('zh-HK', { hour:'2-digit', minute:'2-digit' });
}

// ── Audio capture ───────────────────────────────────────────────────────────
async function ensureAudioSetup() {
  if (!mediaStream) {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, channelCount: 1 }
    });
  }
  if (!audioCtx || audioCtx.state === 'closed') {
    audioCtx = new AudioContext({ sampleRate: 16000 });
  }
  if (audioCtx.state === 'suspended') {
    await audioCtx.resume();
  }
}

function startCapture() {
  pcmChunks = [];
  isRecording = true;

  const source = audioCtx.createMediaStreamSource(mediaStream);
  scriptProcessor = audioCtx.createScriptProcessor(4096, 1, 1);
  silentGain = audioCtx.createGain();
  silentGain.gain.value = 0;

  scriptProcessor.onaudioprocess = (e) => {
    if (!isRecording) return;
    const f32 = e.inputBuffer.getChannelData(0);
    const i16 = new Int16Array(f32.length);
    for (let i = 0; i < f32.length; i++) {
      i16[i] = Math.max(-32768, Math.min(32767, Math.round(f32[i] * 32768)));
    }
    pcmChunks.push(i16.buffer.slice(0));
  };

  source.connect(scriptProcessor);
  scriptProcessor.connect(silentGain);
  silentGain.connect(audioCtx.destination);
}

function stopCapture() {
  isRecording = false;
  if (scriptProcessor) { scriptProcessor.disconnect(); scriptProcessor = null; }
  if (silentGain)       { silentGain.disconnect();      silentGain = null; }

  const totalBytes = pcmChunks.reduce((s, b) => s + b.byteLength, 0);
  if (totalBytes === 0) return null;

  const buf = new Uint8Array(totalBytes);
  let off = 0;
  for (const chunk of pcmChunks) {
    buf.set(new Uint8Array(chunk), off);
    off += chunk.byteLength;
  }
  pcmChunks = [];
  return buf.buffer;
}

// ── Push-to-talk logic ──────────────────────────────────────────────────────
async function onPressStart(e) {
  e.preventDefault();
  if (isBusy) {
    // Allow stopping playback
    if (currentAudio) { currentAudio.pause(); currentAudio = null; isBusy = false; }
    return;
  }
  try {
    await ensureAudioSetup();
  } catch (err) {
    setStatus('error', '無法存取麥克風：' + err.message);
    return;
  }
  startCapture();
  setStatus('recording');
}

async function onPressEnd(e) {
  e.preventDefault();
  if (!isRecording) return;

  const pcmBuffer = stopCapture();
  setStatus('thinking');
  isBusy = true;

  // Show user bubble
  addBubble('user', `<div class="flex items-center gap-xs text-[13px]">
    <span class="material-symbols-outlined text-[16px] text-muted" style="font-variation-settings:'FILL' 0;">mic</span>
    <span class="text-on-surface-variant">語音訊息</span>
    <span class="text-muted text-[11px] ml-auto">${now()}</span>
  </div>`);

  if (!pcmBuffer || pcmBuffer.byteLength < 3200) {
    setStatus('error', '錄音太短，請重試');
    isBusy = false;
    return;
  }

  // AI thinking bubble
  const aiBubble = addBubble('ai', `<div class="flex items-center gap-xs text-muted text-[13px]">
    <span class="dot">·</span><span class="dot">·</span><span class="dot">·</span>
  </div>`);

  try {
    const resp = await fetch('/api/voice-chat', {
      method: 'POST',
      headers: { 'Content-Type': 'audio/pcm' },
      body: pcmBuffer,
    });

    if (!resp.ok) {
      let errMsg = 'AI 服務錯誤';
      try { const j = await resp.json(); errMsg = j.error || errMsg; } catch(_) {}
      throw new Error(errMsg);
    }

    const audioBlob = await resp.blob();
    const url = URL.createObjectURL(audioBlob);

    // Update AI bubble with playback controls
    aiBubble.innerHTML = `
      <div class="flex items-center gap-xs text-[13px]">
        <button onclick="replayAudio('${url}')" class="text-primary-container hover:text-primary-active flex items-center gap-xxs transition-colors">
          <span class="material-symbols-outlined text-[18px]" style="font-variation-settings:'FILL' 1;">play_circle</span>
          <span>語音回覆</span>
        </button>
        <span class="text-muted text-[11px] ml-auto">${now()}</span>
      </div>`;

    setStatus('playing');
    const audio = new Audio(url);
    currentAudio = audio;
    audio.onended = () => {
      URL.revokeObjectURL(url);
      currentAudio = null;
      isBusy = false;
      setStatus('idle');
    };
    audio.onerror = () => {
      currentAudio = null;
      isBusy = false;
      setStatus('error', '音頻播放失敗');
    };
    audio.play().catch(err => {
      isBusy = false;
      setStatus('error', '播放失敗：' + err.message);
    });

  } catch (err) {
    aiBubble.innerHTML = `<div class="flex items-center gap-xs text-[13px] text-error">
      <span class="material-symbols-outlined text-[16px]">error</span>
      <span>${err.message}</span>
    </div>`;
    isBusy = false;
    setStatus('error', err.message);
  }
}

function replayAudio(url) {
  if (currentAudio) { currentAudio.pause(); }
  const audio = new Audio(url);
  currentAudio = audio;
  isBusy = true;
  setStatus('playing');
  audio.onended = () => { currentAudio = null; isBusy = false; setStatus('idle'); };
  audio.play().catch(() => { isBusy = false; setStatus('idle'); });
}

// ── Event listeners ─────────────────────────────────────────────────────────
pttBtn.addEventListener('mousedown',  onPressStart);
pttBtn.addEventListener('touchstart', onPressStart, { passive: false });
pttBtn.addEventListener('mouseup',    onPressEnd);
pttBtn.addEventListener('touchend',   onPressEnd,   { passive: false });
pttBtn.addEventListener('mouseleave', (e) => { if (isRecording) onPressEnd(e); });

// Prevent context menu on long press (mobile)
pttBtn.addEventListener('contextmenu', e => e.preventDefault());

setStatus('idle');
</script>
